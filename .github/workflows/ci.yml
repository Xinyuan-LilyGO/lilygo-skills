name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -q -p lilygo-skills-cli -- -D warnings

      - name: Rust tests
        run: cargo test -q -p lilygo-skills-cli

      - name: Deterministic smoke gate (all hardware-free smokes)
        run: bash scripts/ci-gate.sh

      - name: Benchmark
        run: cargo run --release -q -p lilygo-skills-cli -- benchmark --json --iterations 1000

      - name: Installer dry-run with build plan
        run: node install.js --all --dry-run --build
