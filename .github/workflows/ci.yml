name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dev dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Unit + contract tests
        run: npm test

      - name: Deterministic gate (data / pipeline / JS core smokes)
        run: bash scripts/ci-gate.sh

      - name: Installer dry-run
        run: node install.js --all --dry-run
